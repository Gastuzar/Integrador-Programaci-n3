<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./CSS/login.css">
</head>
<body>
    <div class="login-container">
        <h1 class="login-logo">FOOD STORE</h1>
        <h2 class="login-title">Iniciar Sesión</h2>
        <form id="login-form" action="login.php" method="post">
            <div class="input-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="Ingrese su email" >
            </div>
            <div class="input-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required placeholder="******">
            </div>
            <div class="input-group">
            <input type="button" value="INGRESAR" onclick="window.location.href = 'admin.html';">
            </div>
            <p class="register-link">¿No tienes una cuenta? <a href="#">Registrate acá</a></p>
        </form>
    </div>
</body>
</html>
