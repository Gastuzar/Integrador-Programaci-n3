<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./CSS/login.css">
</head>
<body>
    <div class="login">
        <h1 class="login--logo">FOOD STORE</h1>
        <h2 class="login--title">Iniciar Sesión</h2>
        <form id="login--form" action="login.php" method="post">
            <div class="input--group">
            <label class="login--label" for="email">Email:</label>
            <input class="login--input" type="email" id="email" name="email" required placeholder="Ingrese su email" >
            </div>

            <div class="input--group">
            <label class="login--label" for="password">Contraseña:</label>
            <input class="login--input" type="password" id="password" name="password" required placeholder="******">
            </div>

            <div class="login--group">
            <input class="login--button" type="button" value="INGRESAR" onclick="window.location.href = 'admin.html';">
            </div>
            <p class="login--footer">¿No tienes una cuenta? <a href="#" class="login--link">Registrate acá</a></p>
        </form>
    </div>
</body>
</html>
