<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin</title>
</head>
<body>
    <header>
        <h1>Panel Admin</h1>
            <nav>
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="login.html">Cerrar Sesión</a></li>
                </ul>
            </nav>
    </header>
    <hr color="black">
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>01</td>
                <td><img src="./assets/burger triple.jpg" alt="Hamburguesa triple" width="200" height="200"></td>
                <td>Hamburguesa triple</td>
                <td>Hamburguesas</td>
                <td>15000</td>
                <td>5</td>
                <td>
                    <button type="button">Editar</button>
                    <button type="button">Eliminar</button>
                </td>
            </tr>
            <tr>
                <td>02</td>
                <td><img src="./assets/burger doble.jpg" alt="Hamburguesa doble" width="200" height="200"></td>
                <td>Hamburguesa doble</td>
                <td>Hamburguesas</td>
                <td>12000</td>
                <td>3</td>
                <td>
                    <button type="button">Editar</button>
                    <button type="button">Eliminar</button>
                </td>
            </tr>
            <tr>
                <td>03</td>
                <td><img src="./assets/pizza.jpg" alt="Pizza" width="200" height="200"></td>
                <td>Pizza</td>
                <td>Pizzas</td>
                <td>13000</td>
                <td>8</td>
                <td>
                    <button type="button">Editar</button>
                    <button type="button">Eliminar</button>
                </td>
            </tr>
        </tbody>
    </table>
    <br>
    <details>
        <form > <strong>Agregar Producto Rapido</strong>
            <hr>
            <div >
                <label for="nombre">Nombre del Producto:</label>
                <input id="nombre" type="text" placeholder="Ej: Hamburguesa Doble">
            </div>
            <br>
            <div >
                <label for="precio">Precio:</label>
                <input id="precio" type="number" placeholder="Ej: 10000">
            </div>
            <br>
            <div>
                <label for="stock">Stock Inicial:</label>
                <input id="stock" type="number" placeholder="Ej: 5">
            </div>
            <br>
            <div >
                <label for="categoria">Categoria:</label>
                <select id="categoria">
                    <option value="hamburguesas">Hamburguesas</option>
                    <option value="pizzas">Pizzas</option>
                    <option value="papas">Papas Fritas</option>
                    <option value="bebidas">Bebidas</option>     
                </select>
            </div>
            <br>
            <div >
                <label for="Descripcion">Descripcion:</label>
                <textarea id="Descripcion" placeholder="Ej: Deliciosa hamburguesa con triple de carne y queso derretido."></textarea>
            </div>
            <br>
            <button type="submit">Guardar Producto</button>
        </form>
    </details>
    <footer>
        <p>Panel de administracion - Food Store v1.0</p>
    </footer>
</body>
</html>
